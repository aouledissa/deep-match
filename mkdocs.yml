site_name: DeepMatch
site_description: "Complete Android deeplink toolkit: Gradle plugin, runtime library, schema validation, and interactive HTML reports. Declare once in YAML, generate everything."
site_author: "aouledissa"
site_url: "https://aouledissa.com/deep-match/"
repo_url: "https://github.com/aouledissa/deep-match"
repo_name: "aouledissa/DeepMatch"
copyright: "Copyright &copy; 2026 aouledissa"
docs_dir: docs
theme:
  variant: modern
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - content.code.copy
    - toc.integrate
nav:
  - Overview: index.md
  - Plugin: plugin.md
  - Deeplink Specs: deeplink-specs.md
  - Composite Specs: composite-specs.md
  - AndroidManifest: android-manifest.md
  - Tasks: tasks.md
  - Report: report.md
  - Misc: misc.md
  - Migration Guides:
      - v0.3.0-beta: migrations/migration-guide-0.3.0-beta.md
      - v0.2.0-alpha: migrations/migration-guide-0.2.0-alpha.md
  - Release Notes:
      - v1.2.0: release-notes/1.2.0.md
      - v1.1.0: release-notes/1.1.0.md
      - v1.0.2: release-notes/1.0.2.md
      - v1.0.1: release-notes/1.0.1.md
      - v1.0.0: release-notes/1.0.0.md
      - v0.3.2-beta: release-notes/0.3.2-beta.md
      - v0.3.1-beta: release-notes/0.3.1-beta.md
      - v0.3.0-beta: release-notes/0.3.0-beta.md
      - v0.2.0-alpha: release-notes/0.2.0-alpha.md
      - v0.1.0-alpha: release-notes/0.1.0-alpha.md
extra_css:
  - stylesheets/extra.css
extra_files:
  - robots.txt
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true
  - tables
extra:
  analytics:
    provider: google
    property: G-0B26NFZ0QQ
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: helpful
          note: Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page needs improvement
          data: unhelpful
          note: Thanks for your feedback!
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aouledissa/deep-match
      name: GitHub
