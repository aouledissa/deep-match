name: test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

jobs:
  build-artifacts:
    name: Build and publish artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Local
        run: ./gradlew publishToMavenLocal --no-daemon

      - name: Upload DeepMatch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepmatch-artifacts-${{ github.run_id }}
          path: |
            ~/.m2/repository/com/aouledissa/deepmatch
          retention-days: 1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Maven local directory
        run: mkdir -p ~/.m2/repository/com/aouledissa

      - name: Download DeepMatch Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepmatch-artifacts-${{ github.run_id }}
          path: ~/.m2/repository/com/aouledissa

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Validate sample composite build
        run: ./gradlew -p samples/android-app generateDebugDeeplinkSpecs --no-daemon

  smoke-tests:
    name: Smoke tests
    runs-on: macos-latest
    needs: build-artifacts
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Maven local directory
        run: mkdir -p ~/.m2/repository/com/aouledissa

      - name: Download DeepMatch Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepmatch-artifacts-${{ github.run_id }}
          path: ~/.m2/repository/com/aouledissa

      - name: Build sample app debug APK
        run: ./gradlew -p samples/android-app assembleDebug --no-daemon

      - name: Run smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          script: ./gradlew -p samples/android-app connectedDebugAndroidTest --no-daemon
